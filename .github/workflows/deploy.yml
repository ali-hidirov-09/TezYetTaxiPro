name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: TezYetTaxi.settings_test
          SECRET_KEY: ci-test-secret-key-not-real
          ALLOWED_HOSTS: localhost,testserver
          DEBUG: "True"
          SMS_SKIP_IN_DEV: "True"
          REDIS_URL: redis://localhost:6379/0
          POSTGRES_PASSWORD: test
        run: |
          coverage run manage.py test apps.users apps.orders apps.reviews -v 2
          coverage report --fail-under=75

  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check syntax
        run: find . -name "*.py" -not -path "./.git/*" | xargs python -m py_compile && echo "OK"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t tezyettaxi:${{ github.sha }} .
      - name: Verify
        run: docker image inspect tezyettaxi:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test, lint, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/tezyettaxi

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building and restarting..."
            docker compose -f docker-compose.prod.yml up -d --build

            echo "==> Cleaning old images..."
            docker image prune -f

            echo "==> Health check..."
            sleep 10
            curl -f http://localhost/health/ || exit 1

            echo "==> Deploy complete!"
